# Runs a full benchmark autotest of the pipeline 
name: Benchmark test (154 TED test IDs)

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java (for Nextflow)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Install Nextflow
        run: |
          curl -s https://get.nextflow.io | bash
          sudo mv nextflow /usr/local/bin/nextflow
          nextflow -version

      - name: Build docker images for tests (temporary until GHCR default)
        run: |
          docker compose version
          docker compose build

      - name: Run pipeline (docker,git_actions_test_full)
        env:
          NXF_ANSI_LOG: "false"
        run: |
          set -euxo pipefail
          rm -rf work .nextflow* results/git_actions_test_full || true
          nextflow run workflows/annotate.nf -profile docker,git_actions_test_full

      - name: Compare final_results.tsv to expected
        run: |
          set -euxo pipefail
          diff -U 0 <(sort assets/test_ids/full_154_test/final_results.tsv) <(sort results/git_actions_test_full/final_results.tsv)


